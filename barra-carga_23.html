<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Control de Barra</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #080810;
  --surface: #10101a;
  --surface2: #181825;
  --surface3: #1f1f30;
  --border: #252538;
  --accent: #e8c84a;
  --accent2: #4a8fe8;
  --red: #e85050;
  --green: #50e880;
  --text: #f0efea;
  --muted: #5a5a78;
  --muted2: #8888aa;
  --input-bg: #0c0c16;
  --nav-h: 68px;
  --header-h: 56px;
  --action-h: 58px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  height: 100%;
  overflow: hidden;
  position: fixed;
  width: 100%;
}

/* ===== HEADER ===== */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  z-index: 200;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 3px;
  color: var(--accent);
  flex-shrink: 0;
}

.header-sep { width: 1px; height: 20px; background: var(--border); flex-shrink:0; }

.header-metas {
  display: flex;
  gap: 6px;
  flex: 1;
  overflow: hidden;
}

.hm {
  display: flex;
  flex-direction: column;
  gap: 1px;
  flex: 1;
  min-width: 0;
}

.hm-label {
  font-size: 8px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
}

.hm input, .hm select {
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  outline: none;
  width: 100%;
  padding: 0;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.hm select option { background: var(--surface2); }

/* ===== SCROLL AREA ===== */
#app {
  position: fixed;
  top: var(--header-h);
  bottom: calc(var(--nav-h) + var(--action-h));
  left: 0; right: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ===== PANELS ===== */
.panel { display: none; padding: 12px 12px 16px; }
.panel.active { display: block; }

/* ===== MODO HEADER ===== */
.modo-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.modo-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: 2px;
  line-height: 1;
}

.modo-title.inicio   { color: var(--accent2); }
.modo-title.final    { color: var(--accent); }
.modo-title.deposito { color: var(--green); }
.modo-title.resumen  { color: var(--muted2); }

.progress-pill {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
}

.progress-pill span { color: var(--text); font-weight:600; }

/* ===== PRODUCT CARDS ===== */
.prod-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative;
  transition: border-color 0.2s;
}

.prod-card.filled      { border-color: rgba(74,143,232,0.5); background: rgba(74,143,232,0.06); }
.prod-card.filled-final { border-color: rgba(232,200,74,0.5); background: rgba(232,200,74,0.06); }
.prod-card.filled-dep  { border-color: rgba(80,232,128,0.45); background: rgba(80,232,128,0.05); }

.prod-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.2s;
}
.prod-card.filled .prod-dot      { background: var(--accent2); }
.prod-card.filled-final .prod-dot { background: var(--accent); }
.prod-card.filled-dep .prod-dot  { background: var(--green); }

.prod-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  min-width: 0;
  line-height: 1.3;
}

/* Stepper */
.stepper {
  display: flex;
  align-items: center;
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  flex-shrink: 0;
}

.step-btn {
  width: 44px;
  height: 48px;
  background: none;
  border: none;
  color: var(--muted2);
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
  user-select: none;
  transition: background 0.1s, color 0.1s;
}

.step-btn:active { background: rgba(255,255,255,0.08); color: var(--text); }

.step-val {
  width: 52px;
  height: 48px;
  background: none;
  border: none;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 20px;
  font-weight: 500;
  text-align: center;
  outline: none;
  -webkit-appearance: none;
  padding: 0;
}

.step-val::-webkit-inner-spin-button,
.step-val::-webkit-outer-spin-button { display: none; }

.step-val:focus { color: var(--accent); }
.step-val.inicio-val:focus { color: var(--accent2); }
.step-val.dep-val:focus    { color: var(--green); }

/* ===== RESUMEN ===== */
.totales-bar {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 12px;
  margin-bottom: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  text-align: center;
}

.total-label { font-size: 9px; letter-spacing: 1px; text-transform:uppercase; color:var(--muted); font-family:'DM Mono',monospace; }
.total-val { font-family:'DM Mono',monospace; font-size: 24px; font-weight:500; margin-top: 4px; line-height:1; }
.total-val.ini { color: var(--accent2); }
.total-val.fin { color: var(--accent); }
.total-val.con { color: var(--green); }

.filter-row {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.filter-row::-webkit-scrollbar { display:none; }

.fpill {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.5px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  touch-action: manipulation;
}
.fpill.active { background: var(--accent); color: #080810; border-color: var(--accent); }

.res-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 8px;
}
.res-name {
  font-size: 13px; font-weight: 600; color: var(--text);
  margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.res-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); padding: 3px 0;
}
.res-val { color: var(--text); }
.res-consumido {
  margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 15px; font-weight: 700;
}
.consumido-ok  { color: var(--accent); font-family:'DM Mono',monospace; }
.consumido-err { color: var(--red); font-family:'DM Mono',monospace; }
.res-empty { color: var(--muted); font-size: 11px; font-family: 'DM Mono', monospace; }

/* ===== ACTION ROW ===== */
.action-row {
  position: fixed;
  bottom: var(--nav-h);
  left: 0; right: 0;
  height: var(--action-h);
  background: rgba(8,8,16,0.97);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  z-index: 190;
}

.abtn {
  flex: 1;
  border-radius: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.5px;
  cursor: pointer;
  border: none;
  font-weight: 500;
  touch-action: manipulation;
}
.abtn-save   { background: var(--surface3); border: 1px solid var(--border); color: var(--muted2); }
.abtn-export { background: var(--accent); color: #080810; }
.abtn-clear  { background: transparent; border: 1px solid rgba(232,80,80,0.3); color: var(--red); flex: 0 0 44px; font-size: 16px; }

/* ===== BOTTOM NAV ===== */
nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  transition: color 0.15s;
  touch-action: manipulation;
  padding: 8px 4px;
}
.nav-item.active { color: var(--accent); }
.nav-item svg { width: 22px; height: 22px; }
.nav-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase; }

/* ===== TOAST ===== */
.toast {
  position: fixed;
  top: calc(var(--header-h) + 10px);
  left: 50%; transform: translateX(-50%) translateY(-6px);
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 9px 20px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--green);
  z-index: 999;
  opacity: 0;
  transition: all 0.25s;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== MODAL LIMPIAR ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 500;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-limpiar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 24px 16px 40px;
  width: 100%;
  max-width: 480px;
}
.modal-limpiar-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px; letter-spacing: 2px;
  color: var(--red); margin-bottom: 4px;
}
.modal-limpiar-sub {
  font-size: 12px; color: var(--muted);
  font-family: 'DM Mono', monospace;
  margin-bottom: 16px;
}
.mbtn {
  display: block; width: 100%;
  padding: 14px 16px;
  border-radius: 12px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  cursor: pointer;
  border: none;
  text-align: left;
  margin-bottom: 8px;
  touch-action: manipulation;
  font-weight: 500;
}
.mbtn-seccion {
  background: rgba(74,143,232,0.12);
  border: 1px solid rgba(74,143,232,0.3);
  color: var(--accent2);
}
.mbtn-barra {
  background: rgba(232,200,74,0.12);
  border: 1px solid rgba(232,200,74,0.3);
  color: var(--accent);
}
.mbtn-todo {
  background: rgba(232,80,80,0.1);
  border: 1px solid rgba(232,80,80,0.3);
  color: var(--red);
}
.mbtn-cancel {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  text-align: center;
  margin-top: 4px;
}

/* ===== BÚSQUEDA ===== */
.search-wrap {
  position: relative;
  margin-bottom: 12px;
}
.search-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  padding: 11px 40px 11px 40px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.search-input:focus { border-color: var(--accent2); }
.search-input::placeholder { color: var(--muted); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none;
  width: 18px; height: 18px;
}
.search-clear {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: var(--surface3); border: none; border-radius: 50%;
  color: var(--muted); width: 24px; height: 24px;
  display: none; align-items: center; justify-content: center;
  font-size: 14px; cursor: pointer; touch-action: manipulation;
}
.search-clear.visible { display: flex; }
.prod-card.hidden { display: none; }
.no-results {
  text-align: center; color: var(--muted);
  font-family: 'DM Mono', monospace; font-size: 12px;
  padding: 30px 0; display: none;
}
.no-results.visible { display: block; }

/* ===== SELECTOR LOCAL ===== */
#pantalla-local {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
}
.local-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 38px; letter-spacing: 6px;
  color: var(--accent); margin-bottom: 8px;
}
.local-sub {
  font-family: 'DM Mono', monospace;
  font-size: 11px; letter-spacing: 2px;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 48px;
}
.local-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; color: var(--muted2);
  margin-bottom: 16px; font-weight: 500;
}
.local-btn {
  width: 100%; max-width: 320px;
  padding: 18px 24px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px; font-weight: 600;
  cursor: pointer;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 14px;
  touch-action: manipulation;
  transition: border-color 0.2s, background 0.2s;
}
.local-btn:active { background: var(--surface3); }
.local-btn .local-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px; line-height: 1;
  color: var(--accent); min-width: 32px;
}
.local-btn-info { text-align: left; }
.local-btn-name { font-size: 16px; font-weight: 700; }
.local-btn-count { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
.local-indicator {
  position: fixed; top: 0; left: 0; right: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 14px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
  z-index: 201;
  height: 0; overflow: hidden;
  transition: height 0.2s;
}
.local-indicator.visible { height: 40px; }
.local-ind-name {
  font-family: 'Bebas Neue', sans-serif; font-size: 16px;
  letter-spacing: 2px; color: var(--accent);
}
.local-ind-btn {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--text); background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 5px 12px;
  cursor: pointer; letter-spacing: 0.5px;
  touch-action: manipulation; white-space: nowrap;
}

/* ===== ADMIN ===== */
.admin-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 998;
  display: none;
  flex-direction: column;
  overflow-y: auto;
}
.admin-overlay.open { display: flex; }

.admin-pin-screen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 32px 24px;
}
.admin-pin-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 3px;
  color: var(--accent); margin-bottom: 6px;
}
.admin-pin-sub {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--muted); margin-bottom: 40px; letter-spacing: 1px;
}
.pin-dots {
  display: flex; gap: 16px; margin-bottom: 40px;
}
.pin-dot {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid var(--border);
  background: transparent;
  transition: all 0.15s;
}
.pin-dot.filled { background: var(--accent); border-color: var(--accent); }
.pin-dot.error  { background: var(--red);    border-color: var(--red); }
.pin-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; width: 100%; max-width: 280px;
}
.pin-btn {
  aspect-ratio: 1;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 22px; font-weight: 600;
  cursor: pointer; touch-action: manipulation;
  transition: background 0.1s;
}
.pin-btn:active { background: var(--surface3); }
.pin-btn.del { font-size: 18px; color: var(--muted); }
.pin-btn.empty { background: transparent; border-color: transparent; pointer-events: none; }
.pin-error-msg {
  font-family: 'DM Mono', monospace; font-size: 12px;
  color: var(--red); margin-top: 16px; opacity: 0;
  transition: opacity 0.2s;
}
.pin-error-msg.show { opacity: 1; }
.pin-cancel {
  margin-top: 24px;
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--muted); background: none; border: none;
  cursor: pointer; text-decoration: underline; touch-action: manipulation;
}

/* Admin panel contenido */
.admin-content {
  display: none; flex-direction: column;
  min-height: 100vh; padding: 0 0 60px;
}
.admin-content.open { display: flex; }
.admin-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.admin-header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 3px; color: var(--accent);
}
.admin-close {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--muted); background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 6px 12px; cursor: pointer; touch-action: manipulation;
}
.admin-section {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.admin-section-title {
  font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 12px;
}
.admin-local-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 14px;
  margin-bottom: 10px;
}
.admin-local-card.inactivo { opacity: 0.45; }
.admin-row {
  display: flex; align-items: center;
  justify-content: space-between; gap: 10px;
  margin-bottom: 10px;
}
.admin-local-nombre-input {
  flex: 1;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
  outline: none;
}
.admin-local-nombre-input:focus { border-color: var(--accent); }
.toggle-btn {
  padding: 7px 14px; border-radius: 8px;
  font-family: 'DM Mono', monospace; font-size: 10px;
  cursor: pointer; border: none; touch-action: manipulation; font-weight: 600;
  white-space: nowrap;
}
.toggle-btn.activo   { background: rgba(80,232,128,0.15); color: var(--green); border: 1px solid rgba(80,232,128,0.3); }
.toggle-btn.inactivo { background: rgba(232,80,80,0.1);   color: var(--red);   border: 1px solid rgba(232,80,80,0.25); }

.prod-admin-list {
  max-height: 220px; overflow-y: auto;
  background: var(--input-bg);
  border: 1px solid var(--border); border-radius: 10px;
  margin-bottom: 8px;
}
.prod-admin-item {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 9px 12px;
  border-bottom: 1px solid rgba(42,42,62,0.5);
  font-size: 13px;
}
.prod-admin-item:last-child { border-bottom: none; }
.prod-del-btn {
  background: none; border: none;
  color: var(--red); font-size: 18px;

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const LOCALES = {
  "Local 1": [
    "Agua Nuestra 500ml","Americano Gancia 950ml","Aperitivo Campari 750ml",
    "Cerveza Budweiser Lata 473ml","Champagne Baron B Extra Brut 750ml",
    "Champagne Chandon Délice 750ml","Champagne Chandon Extra Brut 750ml",
    "Champagne Mercier Dulce 750ml","Champagne Mercier Extra Brut 750ml",
    "Corona Cero 330ml x4u","Corona Piñina 330ml","Fernet Branca 1000ml",
    "Fernet Branca 750ml x12u","Gaseosa 7up 2250ml","Gaseosa Coca Cola 1500ml",
    "Gin Bombay 750ml","Gin Gordon's 700ml","Jugo Baggio 1000ml",
    "Licor Jägermeister 700ml","RedBull Energizante 250ml",
    "Ron Bacardí C.B. New 40° 980ml","Speed Energizante 250ml Rojo",
    "Tónica Paso de los Toros 1500ml","Vino Cosecha Tardía Norton 750ml",
    "Vino Latitud 33 MB 750ml","Vino Trumpeter MB 750ml",
    "Vodka Absolut 40° 700ml","Vodka Sernova Clasico 700ml","Vodka Smirnoff 21 700ml"
  ],
  "Local 2": [
    "7up 1.5 Lts","7up 500c","7up Free 500c","Agua Nuestra","Agua Sierra De Los Padres 500cc",
    "Amargo Obrero","Angostura Bitter","Aperol","Bacardi Blanco","Baggio Naranja 1.5 Lts",
    "Bar In Box Heredero","Baron B","Big C Naranja","Borguetti","Brahma Lata",
    "Budweiser Lata","Cachaca Velho Barreiro","Campari","Caña 1 De Agosto",
    "Carpano Bianco 950c","Carpano Rosso 950","Chandon Delice 750","Chandon Extra Brut 750",
    "Cinzano Pro Spritz","Cinzano Rosso","Citric Pomelo 1 Lts","Coca Cola Original 1.5 Lts",
    "Coca Cola Original 2.25 Lts","Corona 330","Corona Cero","Cynar 750c","Damonjag",
    "Don David Malbec 750c","Don David Tannat 750c","Eco Vasos 500cc","Eco Vasos Terceros",
    "Fernet Branca 1000","Fernet Branca 750","Fernet Branca Menta 750",
    "Fond De Cave Chardonnay 750","Fond De Cave Malbec 750","Fond De Cave Reserva Sauvignon Blanc 750",
    "Gancia","Gin Beefeater 700cc","Gin Bombay","Gin Bulldog","Gin Gordons 700cc",
    "Gin Heredero","Gin Heredero Pink 700","Gin Spirito Blu 700","Gin Tanqueray",
    "Granadina Cusenier 750c","H2O Manzana 1.5 Lts","H2O Manzana 500c",
    "H2O Pomelo 1.5 Lts","H2O Pomelo 500c","Hielo","Jagermeister Clasico",
    "Jim Beam 750","Johnnie Walker Black 750","Johnnie Walker Red 750",
    "Latitud 33 Extra Brut 705c","Latitud 33 Malbec","Malibu Coco 750c",
    "Martini Bianco","Martini Extra Drive","Martini Rosso","Mercier Extra Brut 750",
    "Norton Cosecha Tardia 750","Paso De Los Toros Pomelo","Paso De Los Toros Tonica",
    "Pepsi Black 1.5 Lts","Pepsi Black 500c","Pepsi Original 1.5 Lts","Pepsi Original 500c",
    "Pineral","Punt E Mes","Pura Fresh Pomelo 1 Lts","Quilmes Lata 0","Red Bull",
    "Ron Havana Club","Smirnoff Classic 700cc","Speed","Stella Artois 1 Litro",
    "Stella Artois 330","Stella Artois 330 Cero","Stella Artois Lata",
    "Tequila Jose Cuervo Blanco","Tequila Jose Cuervo Dorado","Tia Maria",
    "Trapiche Medalla Malbec","Trumpeter Malbec","Vaso Fernetero 1 Lts","Vat 69 750",
    "Vodka Absolut Clasico","Vodka Sernova Clasico","Vodka Sky"
  ]
};

let localActual = localStorage.getItem('barra-local-actual') || 'Local 1';
let PRODUCTOS = LOCALES[localActual];

// state indexado por barra: { "Barra 1": { inicio:{}, final:{}, deposito:{} }, ... }
let allState = {};
let filtroActual = 'todos';
let localesInactivos = [];

// Cargar config admin guardada (nombres/productos/activos)
(function() {
  const cfg = localStorage.getItem('barra-config');
  if (cfg) {
    try {
      const { locales, inactivos } = JSON.parse(cfg);
      // Validar que locales sea un objeto con al menos un local con productos
      if (locales && typeof locales === 'object') {
        const valido = Object.values(locales).every(p => Array.isArray(p));
        if (valido && Object.keys(locales).length > 0) {
          Object.keys(LOCALES).forEach(k => delete LOCALES[k]);
          Object.assign(LOCALES, locales);
          localesInactivos = inactivos || [];
        }
      }
    } catch(e) { console.warn('Config admin inválida, usando defaults'); }
  }
})();

document.getElementById('meta-fecha').valueAsDate = new Date();

function barraActual() {
  return document.getElementById('meta-barra').value;
}

function getState() {
  const key = localActual + '::' + barraActual();
  if (!allState[key]) allState[key] = { inicio:{}, final:{}, deposito:{} };
  return allState[key];
}

function getStateOf(local, barra) {
  const key = local + '::' + barra;
  return allState[key] || { inicio:{}, final:{}, deposito:{} };
}

function buildCards(containerId, tipo) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  if (!PRODUCTOS || !Array.isArray(PRODUCTOS)) {
    console.error('PRODUCTOS no definido al buildCards', localActual);
    PRODUCTOS = LOCALES[localActual] || Object.values(LOCALES)[0] || [];
  }
  const st = getState();
  const filledClass = tipo==='inicio' ? 'filled' : tipo==='final' ? 'filled-final' : 'filled-dep';
  const valClass    = tipo==='inicio' ? 'inicio-val' : tipo==='final' ? 'final-val' : 'dep-val';

  PRODUCTOS.forEach((prod, i) => {
    const val = st[tipo][prod] ?? 0;
    const card = document.createElement('div');
    card.className = 'prod-card' + (val>0 ? ' '+filledClass : '');
    card.id = `card-${tipo}-${i}`;
    card.innerHTML = `
      <div class="prod-dot"></div>
      <div class="prod-name">${prod}</div>
      <div class="stepper">
        <button class="step-btn" ontouchstart="" onclick="step('${tipo}',${i},-1)">−</button>
        <input type="number" inputmode="numeric" pattern="[0-9]*"
          class="step-val ${valClass}" id="val-${tipo}-${i}"
          value="${val}" min="0"
          onfocus="this.select()"
          onblur="if(this.value===''||isNaN(+this.value))this.value=0;commitVal('${tipo}',${i},+this.value||0)"
          oninput="setVal(this,'${tipo}',${i})">
        <button class="step-btn" ontouchstart="" onclick="step('${tipo}',${i},1)">+</button>
      </div>
    `;
    container.appendChild(card);
  });
  updateProgress(tipo);
}

function step(tipo, idx, dir) {
  const inp = document.getElementById(`val-${tipo}-${idx}`);
  let v = parseInt(inp.value) || 0;
  v = Math.max(0, v + dir);
  inp.value = v;
  commitVal(tipo, idx, v);
}

function setVal(inp, tipo, idx) {
  // mientras escribe, no forzar 0 — dejar que el campo quede vacío transitoriamente
  if (inp.value === '' || inp.value === '-') return;
  let v = parseInt(inp.value);
  if (isNaN(v) || v < 0) { inp.value = 0; v = 0; }
  commitVal(tipo, idx, v);
}

function commitVal(tipo, idx, v) {
  const prod = PRODUCTOS[idx];
  getState()[tipo][prod] = v;
  const card = document.getElementById(`card-${tipo}-${idx}`);
  if (card) {
    const fc = tipo==='inicio'?'filled':tipo==='final'?'filled-final':'filled-dep';
    card.classList.toggle(fc, v>0);
  }
  updateProgress(tipo);
  autoGuardar();
}

function updateProgress(tipo) {
  const st = getState();
  const count = PRODUCTOS.filter(p => (st[tipo][p]??0) > 0).length;
  const el = document.getElementById(`prog-${tipo}`);
  if (el) el.textContent = count;
  const tot = document.getElementById(`total-${tipo}`);
  if (tot) tot.textContent = PRODUCTOS.length;
}

// Al cambiar de barra: rebuild todos los panels visibles
function onLocalChange(nuevoLocal) {
  // Validar que el local exista
  if (!LOCALES[nuevoLocal]) {
    console.error('Local no encontrado:', nuevoLocal, 'Disponibles:', Object.keys(LOCALES));
    toast('Error: local no encontrado');
    return;
  }
  localActual = nuevoLocal;
  PRODUCTOS = LOCALES[localActual];
  localStorage.setItem('barra-local-actual', localActual);
  ['inicio','final','deposito'].forEach(t => {
    const c = document.getElementById('cards-'+t);
    if (c) c.innerHTML = '';
    limpiarBusqueda(t);
  });
  const panelActivo = document.querySelector('.panel.active');
  if (panelActivo) {
    const id = panelActivo.id.replace('panel-','');
    if (id === 'resumen') buildResumen();
    else buildCards('cards-'+id, id);
  }
  autoGuardar();
  cerrarSelectorLocal();
}

function onBarraChange() {
  ['inicio','final','deposito'].forEach(t => {
    const c = document.getElementById('cards-'+t);
    if (c) c.innerHTML = '';
    limpiarBusqueda(t);
  });
  const panelActivo = document.querySelector('.panel.active');
  if (panelActivo) {
    const id = panelActivo.id.replace('panel-','');
    if (id === 'resumen') buildResumen();
    else buildCards('cards-'+id, id);
  }
  autoGuardar();
}

function buildResumen() {
  const st = getState();
  let totIni=0, totFin=0, totCon=0, totStock=0;
  PRODUCTOS.forEach(p => {
    const i=st.inicio[p]||0, f=st.final[p]||0, d=st.deposito[p]||0;
    totIni+=i; totFin+=f;
    totCon+=(i-f);           // consumido = inicio - final
    totStock+=(f+d);         // stock final = final barra + depósito
  });
  document.getElementById('totales-bar').innerHTML = `
    <div><div class="total-label">Inicio</div><div class="total-val ini">${totIni}</div></div>
    <div><div class="total-label">Consumido</div><div class="total-val con">${totCon}</div></div>
    <div><div class="total-label">Stock Final</div><div class="total-val fin">${totStock}</div></div>
  `;
  renderResumenCards();
}

function renderResumenCards() {
  const st = getState();
  const container = document.getElementById('cards-resumen');
  container.innerHTML = '';
  PRODUCTOS.forEach(prod => {
    const ini=st.inicio[prod]||0, fin=st.final[prod]||0, dep=st.deposito[prod]||0;
    const con = ini - fin;              // consumido = solo lo de barra
    const stockFinal = fin + dep;       // lo que quedó en barra + depósito
    const sinDatos = ini===0 && fin===0 && dep===0;
    if (filtroActual==='consumo' && con<=0) return;
    if (filtroActual==='alerta'  && con<0) return;
    if (filtroActual==='sin'     && !sinDatos) return;
    const card = document.createElement('div');
    card.className = 'res-card';
    card.innerHTML = `
      <div class="res-name">${prod}</div>
      ${sinDatos ? '<div class="res-empty">Sin datos cargados</div>' : `
      <div class="res-row"><span>Inicio barra</span><span class="res-val">${ini}</span></div>
      <div class="res-row"><span>Depósito</span><span class="res-val">${dep}</span></div>
      <div class="res-row"><span>Final barra</span><span class="res-val">${fin}</span></div>
      <div class="res-consumido" style="margin-bottom:6px">
        <span>Consumido</span>
        <span class="${con>=0?'consumido-ok':'consumido-err'}">${con>=0?con:'⚠ '+con}</span>
      </div>
      <div class="res-row" style="background:rgba(80,232,128,0.07);border-radius:6px;padding:5px 6px;margin-top:2px">
        <span style="color:var(--green);font-weight:600">Stock final total</span>
        <span style="color:var(--green);font-weight:700;font-family:'DM Mono',monospace">${stockFinal}</span>
      </div>`}
    `;
    container.appendChild(card);
  });
}

function setFiltro(f, el) {
  filtroActual = f;
  document.querySelectorAll('.fpill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderResumenCards();
}

function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  document.getElementById('app').scrollTop = 0;

  if (tab === 'resumen') { buildResumen(); return; }
  buildCards('cards-'+tab, tab);
  limpiarBusqueda(tab);
}

function abrirSelectorLocal() {
  document.getElementById('pantalla-local').style.display = 'flex';
}

function cerrarSelectorLocal() {
  document.getElementById('pantalla-local').style.display = 'none';
  document.getElementById('local-ind-nombre').textContent = localActual;
  document.getElementById('local-indicator').classList.add('visible');
  document.getElementById('app').style.top = 'calc(var(--header-h) + 40px)';
  document.querySelector('header').style.top = '40px';
}

function autoGuardar() {
  localStorage.setItem('barra-control', JSON.stringify({
    allState,
    meta: {
      fecha: document.getElementById('meta-fecha').value,
      barra: document.getElementById('meta-barra').value,
      resp:  document.getElementById('meta-resp').value
    }
  }));
}

function guardarLocal() { autoGuardar(); toast('✓ Guardado'); }

function cargarLocal() {
  const raw = localStorage.getItem('barra-control');
  if (!raw) return;
  try {
    const d = JSON.parse(raw);
    allState = d.allState || {};
    if (d.meta) {
      if (d.meta.fecha) document.getElementById('meta-fecha').value = d.meta.fecha;
      if (d.meta.barra) document.getElementById('meta-barra').value = d.meta.barra;
      if (d.meta.resp)  document.getElementById('meta-resp').value  = d.meta.resp;
    }
  } catch(e){}
}

function abrirModalLimpiar() {
  // Detectar sección activa para el botón contextual
  const panelActivo = document.querySelector('.panel.active');
  const tabActiva = panelActivo ? panelActivo.id.replace('panel-','') : null;
  const barra = barraActual();

  const btnSec = document.getElementById('btn-limpiar-seccion');
  const btnBar = document.getElementById('btn-limpiar-barra');

  if (tabActiva && ['inicio','final','deposito'].includes(tabActiva)) {
    const nombres = { inicio:'Inicio', final:'Final', deposito:'Depósito' };
    btnSec.textContent = `🔵 Borrar solo "${nombres[tabActiva]}" de ${barra}`;
    btnSec.dataset.seccion = tabActiva;
    btnSec.style.display = 'block';
  } else {
    btnSec.style.display = 'none';
  }

  btnBar.textContent = `🟡 Borrar todos los datos de ${barra}`;
  document.getElementById('modal-limpiar').classList.add('open');
}

function cerrarModalLimpiar() {
  document.getElementById('modal-limpiar').classList.remove('open');
}

function limpiarSeccion() {
  const btn = document.getElementById('btn-limpiar-seccion');
  const seccion = btn.dataset.seccion;
  const barra = barraActual();
  if (!confirm(`¿Borrar ${seccion} de ${barra}?`)) return;
  const key = localActual + '::' + barra;
  if (!allState[key]) allState[key] = { inicio:{}, final:{}, deposito:{} };
  allState[key][seccion] = {};
  autoGuardar();
  const c = document.getElementById('cards-'+seccion);
  if (c) c.innerHTML = '';
  buildCards('cards-'+seccion, seccion);
  cerrarModalLimpiar();
  toast(`✓ ${seccion} de ${barra} limpiado`);
}

function limpiarBarra() {
  const barra = barraActual();
  if (!confirm(`¿Borrar todos los datos de ${barra}?`)) return;
  allState[localActual + '::' + barra] = { inicio:{}, final:{}, deposito:{} };
  autoGuardar();
  ['inicio','final','deposito'].forEach(t => {
    const c = document.getElementById('cards-'+t);
    if (c) c.innerHTML = '';
  });
  buildCards('cards-inicio','inicio');
  switchTab('inicio');
  cerrarModalLimpiar();
  toast(`✓ ${barra} limpiada`);
}

function limpiarTodo() {
  if (!confirm('¿Borrar TODOS los datos de todas las barras? Esta acción no se puede deshacer.')) return;
  allState = {};
  localStorage.removeItem('barra-control');
  ['inicio','final','deposito'].forEach(t => {
    const c = document.getElementById('cards-'+t);
    if (c) c.innerHTML = '';
  });
  buildCards('cards-inicio','inicio');
  switchTab('inicio');
  cerrarModalLimpiar();
  toast('✓ Todos los datos borrados');
}

function exportarExcel() {
  const fecha = document.getElementById('meta-fecha').value || 'sin-fecha';
  const resp  = document.getElementById('meta-resp').value || '-';
  const wb = XLSX.utils.book_new();
  const BARRAS = ['Barra 1','Barra 2','Barra 3','Barra 4','Barra 5'];
  const prods = LOCALES[localActual];

  // ── HOJA MAESTRA (estructura igual al Excel original) ──
  // Columnas: A=Producto | B=Depósito | C-G=Inicio B1-B5 | H-L=Final B1-B5 | M=Total Consumido
  const hdr1 = ['Producto','DEPÓSITO','INICIO BARRA','','','','','FINAL BARRA','','','','','',''];
  const hdr2 = ['Producto','Depósito','Inicio B1','Inicio B2','Inicio B3','Inicio B4','Inicio B5','Final B1','Final B2','Final B3','Final B4','Final B5','Consumido','Stock Final Total'];

  const maestraRows = [
    [`CONTROL DE BARRA — Fecha: ${fecha} — Responsable: ${resp}`],
    [],
    hdr1,
    hdr2
  ];

  prods.forEach(prod => {
    const iB     = BARRAS.map(b => getStateOf(localActual,b).inicio[prod]   || 0);
    const fB     = BARRAS.map(b => getStateOf(localActual,b).final[prod]    || 0);
    const depTot = BARRAS.reduce((s,b) => s + (getStateOf(localActual,b).deposito[prod]||0), 0);
    const totIni = iB.reduce((a,b)=>a+b,0);
    const totFin = fB.reduce((a,b)=>a+b,0);
    const consumido   = totIni - totFin;          // solo lo vendido en barra
    const stockFinal  = totFin + depTot;          // lo que quedó en barra + depósito
    maestraRows.push([prod, depTot, ...iB, ...fB, consumido, stockFinal]);
  });

  const wsMaestra = XLSX.utils.aoa_to_sheet(maestraRows);
  wsMaestra['!cols'] = [
    {wch:35},{wch:10},
    {wch:11},{wch:11},{wch:11},{wch:11},{wch:11},
    {wch:11},{wch:11},{wch:11},{wch:11},{wch:11},
    {wch:12},{wch:14}
  ];
  // Merge header grupos
  wsMaestra['!merges'] = [
    {s:{r:2,c:2}, e:{r:2,c:6}},  // INICIO BARRA
    {s:{r:2,c:7}, e:{r:2,c:11}}  // FINAL BARRA
  ];
  XLSX.utils.book_append_sheet(wb, wsMaestra, 'Carga');

  // ── HOJAS POR BARRA (solo barras con datos) ──
  let hayDatos = false;
  BARRAS.forEach(barra => {
    const st = allState[localActual + '::' + barra];
    if (!st) return;
    const st2 = getStateOf(localActual, barra);
    const tieneDatos = prods.some(p => (st2.inicio[p]||0)+(st2.final[p]||0)+(st2.deposito[p]||0) > 0);
    if (!tieneDatos) return;
    hayDatos = true;
    const rows = [
      ['CONTROL DE BARRA'],
      [`Fecha: ${fecha}`, '', `Local: ${localActual}`, '', `Barra: ${barra}`, '', `Responsable: ${resp}`],
      [],
      ['Producto','Depósito','Inicio','Final','Consumido','Stock Final Total']
    ];
    prods.forEach(prod => {
      const st = st2;
      const ini=st.inicio[prod]||0, fin=st.final[prod]||0, dep=st.deposito[prod]||0;
      const consumido = ini - fin;        // vendido en barra
      const stockFinal = fin + dep;       // lo que quedó
      rows.push([prod, dep, ini, fin, consumido, stockFinal]);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:35},{wch:10},{wch:10},{wch:10},{wch:12},{wch:16}];
    XLSX.utils.book_append_sheet(wb, ws, barra);
  });

  if (!hayDatos && maestraRows.length <= 4) { toast('No hay datos cargados'); return; }

  // Generar blob y compartir sin bloquear el hilo principal
  const fileName = `barra-control-${fecha}.xlsx`;
  toast('Preparando archivo...');

  setTimeout(() => {
    try {
      const wbOut = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
      const blob  = new Blob([wbOut], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      const file  = new File([blob], fileName, { type: blob.type });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: 'Control de Barra', text: `Fecha: ${fecha}` })
          .then(() => toast('✓ Compartido'))
          .catch(err => { if (err.name !== 'AbortError') descargarDirecto(blob, fileName); });
      } else {
        descargarDirecto(blob, fileName);
      }
    } catch(e) {
      toast('Error al generar archivo');
      console.error(e);
    }
  }, 50);
}

function descargarDirecto(blob, fileName) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = fileName;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1500);
  toast('⬇ Descargando...');
}

function filtrarCards(tipo, query) {
  const q = query.trim().toLowerCase();
  const cards = document.querySelectorAll(`#cards-${tipo} .prod-card`);
  let visibles = 0;
  cards.forEach(card => {
    const nombre = card.querySelector('.prod-name').textContent.toLowerCase();
    const match = nombre.includes(q);
    card.classList.toggle('hidden', !match);
    if (match) visibles++;
  });
  // mostrar/ocultar "sin resultados"
  const noRes = document.getElementById(`no-results-${tipo}`);
  if (noRes) noRes.classList.toggle('visible', visibles === 0 && q.length > 0);
  // mostrar/ocultar botón X
  const clr = document.getElementById(`search-clear-${tipo}`);
  if (clr) clr.classList.toggle('visible', q.length > 0);
}

function clearSearch(tipo) {
  const inp = document.getElementById(`search-${tipo}`);
  if (inp) { inp.value = ''; filtrarCards(tipo, ''); inp.focus(); }
}

function limpiarBusqueda(tipo) {
  const inp = document.getElementById(`search-${tipo}`);
  if (inp) { inp.value = ''; }
  const cards = document.querySelectorAll(`#cards-${tipo} .prod-card`);
  cards.forEach(c => c.classList.remove('hidden'));
  const noRes = document.getElementById(`no-results-${tipo}`);
  if (noRes) noRes.classList.remove('visible');
  const clr = document.getElementById(`search-clear-${tipo}`);
  if (clr) clr.classList.remove('visible');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.getElementById('meta-barra').addEventListener('change', onBarraChange);
['meta-fecha','meta-resp'].forEach(id => {
  document.getElementById(id).addEventListener('change', autoGuardar);
  document.getElementById(id).addEventListener('input', autoGuardar);
});

// ─── ADMIN ───
const ADMIN_PIN = '5467';
let pinActual = '';
let adminLocalesTemp = {};

function abrirAdmin() {
  pinActual = '';
  actualizarDots();
  document.getElementById('admin-pin-screen').style.display = 'flex';
  document.getElementById('admin-content').classList.remove('open');
  document.getElementById('pin-error').classList.remove('show');
  document.getElementById('admin-overlay').classList.add('open');
}

function cerrarAdmin() {
  document.getElementById('admin-overlay').classList.remove('open');
  pinActual = '';
}

function pinPress(n) {
  if (pinActual.length >= 4) return;
  pinActual += n;
  actualizarDots();
  if (pinActual.length === 4) setTimeout(verificarPin, 150);
}

function pinDel() {
  pinActual = pinActual.slice(0, -1);
  actualizarDots();
  document.getElementById('pin-error').classList.remove('show');
}

function actualizarDots(estado) {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('pd' + i);
    d.classList.remove('filled','error');
    if (estado === 'error') d.classList.add('error');
    else if (i < pinActual.length) d.classList.add('filled');
  }
}

function verificarPin() {
  if (pinActual === ADMIN_PIN) {
    document.getElementById('admin-pin-screen').style.display = 'none';
    document.getElementById('admin-content').classList.add('open');
    renderAdminLocales();
  } else {
    actualizarDots('error');
    document.getElementById('pin-error').classList.add('show');
    setTimeout(() => { pinActual=''; actualizarDots(); document.getElementById('pin-error').classList.remove('show'); }, 1200);
  }
}

function renderAdminLocales() {
  adminLocalesTemp = {};
  Object.keys(LOCALES).forEach(k => {
    adminLocalesTemp[k] = { nombre: k, productos: [...LOCALES[k]], activo: !localesInactivos.includes(k) };
  });
  buildAdminUI();
}

function buildAdminUI() {
  const container = document.getElementById('admin-locales-container');
  container.innerHTML = '';
  Object.keys(adminLocalesTemp).forEach(key => {
    const loc = adminLocalesTemp[key];
    const div = document.createElement('div');
    div.className = 'admin-local-card' + (loc.activo ? '' : ' inactivo');
    div.id = 'admin-card-' + key;
    div.innerHTML = `
      <div class="admin-row">
        <input class="admin-local-nombre-input" value="${loc.nombre}" data-key="${key}"
          onchange="adminLocalesTemp['${key}'].nombre=this.value.trim()||'${key}'" placeholder="Nombre del local">
        <button class="toggle-btn ${loc.activo?'activo':'inactivo'}" id="toggle-${key}" onclick="adminToggle('${key}')">
          ${loc.activo ? '✓ Activo' : '✗ Inactivo'}
        </button>
      </div>
      <div class="admin-section-title" id="prod-count-${key}" style="margin-bottom:6px">${loc.productos.length} productos</div>
      <div class="prod-admin-list" id="prod-list-${key}"></div>
      <div class="admin-add-row">
        <input class="admin-add-input" id="add-input-${key}" placeholder="Agregar producto..." autocorrect="off"
          onkeydown="if(event.key==='Enter')adminAgregar('${key}')">
        <button class="admin-add-btn" onclick="adminAgregar('${key}')">+ Agregar</button>
      </div>`;
    container.appendChild(div);
    renderProdList(key);
  });
}

function renderProdList(key) {
  const list = document.getElementById('prod-list-' + key);
  if (!list) return;
  list.innerHTML = '';
  adminLocalesTemp[key].productos.forEach((prod, i) => {
    const item = document.createElement('div');
    item.className = 'prod-admin-item';
    item.innerHTML = `<span style="flex:1;font-size:13px">${prod}</span>
      <button class="prod-del-btn" onclick="adminEliminar('${key}',${i})">×</button>`;
    list.appendChild(item);
  });
}

function adminToggle(key) {
  adminLocalesTemp[key].activo = !adminLocalesTemp[key].activo;
  const activo = adminLocalesTemp[key].activo;
  document.getElementById('admin-card-' + key).className = 'admin-local-card' + (activo?'':' inactivo');
  const btn = document.getElementById('toggle-' + key);
  btn.className = 'toggle-btn ' + (activo?'activo':'inactivo');
  btn.textContent = activo ? '✓ Activo' : '✗ Inactivo';
}

function adminEliminar(key, idx) {
  adminLocalesTemp[key].productos.splice(idx, 1);
  renderProdList(key);
  document.getElementById('prod-count-' + key).textContent = adminLocalesTemp[key].productos.length + ' productos';
}

function adminAgregar(key) {
  const inp = document.getElementById('add-input-' + key);
  const val = inp.value.trim();
  if (!val) return;
  adminLocalesTemp[key].productos.push(val);
  inp.value = '';
  renderProdList(key);
  document.getElementById('prod-count-' + key).textContent = adminLocalesTemp[key].productos.length + ' productos';
  const list = document.getElementById('prod-list-' + key);
  list.scrollTop = list.scrollHeight;
}

function adminGuardar() {
  const nuevosLocales = {};
  const nuevosInactivos = [];

  Object.keys(adminLocalesTemp).forEach(key => {
    const loc = adminLocalesTemp[key];
    const nombre = loc.nombre.trim() || key;
    nuevosLocales[nombre] = loc.productos;
    if (!loc.activo) nuevosInactivos.push(nombre);
  });

  // Actualizar LOCALES global
  Object.keys(LOCALES).forEach(k => delete LOCALES[k]);
  Object.assign(LOCALES, nuevosLocales);

  localesInactivos.length = 0;
  nuevosInactivos.forEach(n => localesInactivos.push(n));

  // Buscar el nuevo nombre del local actual (por posición/índice)
  const keysViejos = Object.keys(adminLocalesTemp);
  const keysNuevos = Object.keys(nuevosLocales);
  const idxActual  = keysViejos.indexOf(localActual);
  // Si encontró el local actual entre los viejos, usar el nombre nuevo en esa posición
  if (idxActual !== -1 && keysNuevos[idxActual]) {
    localActual = keysNuevos[idxActual];
  } else {
    // Fallback: primer local disponible
    localActual = keysNuevos.find(k => !localesInactivos.includes(k)) || keysNuevos[0];
  }

  PRODUCTOS = LOCALES[localActual] || Object.values(LOCALES)[0];
  localStorage.setItem('barra-local-actual', localActual);
  localStorage.setItem('barra-config', JSON.stringify({ locales: LOCALES, inactivos: localesInactivos }));

  ['inicio','final','deposito'].forEach(t => { const c=document.getElementById('cards-'+t); if(c) c.innerHTML=''; });

  cerrarAdmin();
  toast('✓ Cambios guardados');
  abrirSelectorLocal();
  actualizarPantallaLocal();
}

function actualizarPantallaLocal() {
  const container = document.getElementById('pantalla-local');
  container.querySelectorAll('.local-btn').forEach(b => b.remove());
  const adminBtn = container.querySelector('button[onclick="abrirAdmin()"]');
  Object.keys(LOCALES).forEach((nombre, i) => {
    if (localesInactivos.includes(nombre)) return;
    const btn = document.createElement('button');
    btn.className = 'local-btn';
    btn.setAttribute('onclick', `onLocalChange('${nombre}')`);
    btn.innerHTML = `<div class="local-num">${i+1}</div>
      <div class="local-btn-info">
        <div class="local-btn-name">${nombre}</div>
        <div class="local-btn-count">${LOCALES[nombre].length} productos</div>
      </div>`;
    container.insertBefore(btn, adminBtn);
  });
}


cargarLocal();
// Si ya había un local guardado, saltar pantalla de selección
const localGuardado = localStorage.getItem('barra-local-actual');
const localesDisponibles = Object.keys(LOCALES).filter(k => !localesInactivos.includes(k));
if (localGuardado && LOCALES[localGuardado]) {
  localActual = localGuardado;
  PRODUCTOS = LOCALES[localActual];
  cerrarSelectorLocal();
  actualizarPantallaLocal();
} else if (localesDisponibles.length === 1) {
  // Si solo hay un local activo, entrar directo
  localActual = localesDisponibles[0];
  PRODUCTOS = LOCALES[localActual];
  cerrarSelectorLocal();
  actualizarPantallaLocal();
} else {
  // Mostrar pantalla de selección y actualizar los botones
  actualizarPantallaLocal();
}
