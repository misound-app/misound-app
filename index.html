
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --bg:#f2f2f7;--surface:#fff;--surface2:#f2f2f7;--border:#e5e5ea;--border2:#d1d1d6;
  --text:#1c1c1e;--text2:#6e6e73;--text3:#aeaeb2;
  --accent:#1D9E75;--accent-light:#f0fdf4;
  --red:#ef4444;--red-bg:#fee2e2;--red-border:#fca5a5;--red-text:#7f1d1d;
  --amber-bg:#fef3c7;--amber-border:#fde68a;--amber-text:#7c5a0a;
  --sh:0 1px 4px rgba(0,0,0,.1);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--surface:#2c2c2e;--surface2:#3a3a3c;--border:#3a3a3c;--border2:#48484a;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#6e6e73;
    --accent:#30d48a;--accent-light:#0a2a1a;
    --red:#ff6b6b;--red-bg:#3a1a1a;--red-border:#7f1d1d;--red-text:#ff9999;
    --amber-bg:#2a2000;--amber-border:#7c5a0a;--amber-text:#fcd34d;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
.wrap{max-width:430px;margin:0 auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:14px 16px}
.tabs{display:flex;background:var(--surface2);border-radius:10px;padding:3px;gap:2px}
.tab{flex:1;text-align:center;padding:6px 8px;font-size:12px;font-weight:600;border-radius:8px;border:none;background:none;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s}
.tab.on{background:var(--surface);color:var(--text);box-shadow:var(--sh)}
.prog{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.prog-f{height:100%;border-radius:3px;background:var(--accent);transition:width .3s}
.btn{border:1px solid var(--border2);background:var(--surface);border-radius:10px;padding:8px 14px;font-size:13px;font-family:inherit;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s}
.btn:active{opacity:.8}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.search-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:8px 12px 8px 34px;font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none}
.search-input:focus{border-color:var(--accent)}.search-input::placeholder{color:var(--text3)}
.acciones-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* GRUPO DE EQUIPO */
.grupo-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:8px}

/* HEADER DEL GRUPO — con botones marcar/desmarcar */
.grupo-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.grupo-ico{font-size:20px;flex-shrink:0}
.grupo-info{flex:1;min-width:0}
.grupo-nombre{font-size:14px;font-weight:700}
.grupo-sub{font-size:11px;color:var(--text2);margin-top:1px}
.grupo-acciones{display:flex;gap:6px;flex-shrink:0}
.mini-btn{border:1px solid var(--border2);background:var(--surface2);border-radius:7px;padding:4px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text2);transition:all .15s;white-space:nowrap}
.mini-btn.all{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.mini-btn.none{border-color:var(--red-border);color:var(--red-text);background:var(--red-bg)}
@media(prefers-color-scheme:dark){.mini-btn.all{color:#30d48a}.mini-btn.none{color:#ff9999}}

/* ITEMS */
.grupo-items{padding:0 14px 8px}
.chk-unit{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.chk-unit:last-child{border:none}
.chk-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border2);background:var(--surface);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chk-box.on{background:var(--accent);border-color:var(--accent)}
.chk-box.on::after{content:'';display:block;width:5px;height:10px;border:2.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.chk-uid{font-size:12px;font-weight:800;letter-spacing:.5px;min-width:72px}
.chk-model{font-size:12px;color:var(--text2);flex:1}
.chk-dep{font-size:10px;color:var(--text3);font-weight:600;white-space:nowrap}
.hl{background:rgba(29,158,117,.15);border-radius:3px;padding:0 2px}

.step-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.step-circle{width:32px;height:32px;border-radius:50%;border:2px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2);transition:all .2s}
.step-circle.done{background:var(--accent);border-color:var(--accent);color:#fff}
.step-circle.active{border-color:var(--accent);color:var(--accent)}
.step-label{font-size:9px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.step-line{flex:1;height:2px;background:var(--border);border-radius:1px;margin-bottom:16px}
.step-line.done{background:var(--accent)}
.no-results{text-align:center;padding:20px;color:var(--text3);font-size:13px}

/* mini progress por grupo */
.grupo-prog{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:4px}
.grupo-prog-f{height:100%;border-radius:2px;background:var(--accent);transition:width .3s}
</style>

<div class="wrap">

  <div style="display:flex;align-items:center;gap:8px">
    <button class="btn" style="padding:6px 10px;font-size:12px">← Volver</button>
    <div>
      <div style="font-size:15px;font-weight:700">Casamiento García</div>
      <div style="font-size:12px;color:var(--text2)">12 Abr 2025 · 21:00 · Club Náutico</div>
    </div>
  </div>

  <div class="card" style="padding:14px">
    <div class="step-row">
      <div class="step"><div class="step-circle active" id="step-carga">📦</div><div class="step-label">Carga</div></div>
      <div class="step-line" id="line-1"></div>
      <div class="step"><div class="step-circle" id="step-evento">🎉</div><div class="step-label">Evento</div></div>
      <div class="step-line" id="line-2"></div>
      <div class="step"><div class="step-circle" id="step-regreso">🏠</div><div class="step-label">Regreso</div></div>
    </div>
    <div style="display:flex;gap:12px;font-size:12px;color:var(--text2);flex-wrap:wrap">
      <span>🕐 Carga: <strong>15:00</strong></span>
      <span>🕐 Desc: <strong>03:00</strong></span>
      <span>📦 <strong id="c-count">0</strong>/21 cargados</span>
      <span>🏠 <strong id="r-count">0</strong>/21 regresaron</span>
    </div>
    <div class="prog" style="margin-top:8px"><div class="prog-f" id="prog-bar" style="width:0%"></div></div>
  </div>

  <div class="tabs">
    <button class="tab on" id="tab-carga" onclick="switchTab('carga')">📦 Carga (<span id="tab-c">0</span>/21)</button>
    <button class="tab" id="tab-regreso" onclick="switchTab('regreso')">🏠 Regreso (<span id="tab-r">0</span>/21)</button>
  </div>

  <!-- Búsqueda -->
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="log-search" placeholder="Buscar ID (ej: LA-003), modelo, depósito..." oninput="render()">
  </div>

  <!-- Acciones globales -->
  <div class="acciones-grid">
    <button class="btn btn-p" style="font-size:12px;padding:8px" id="btn-all" onclick="marcarTodo(true)">✓ Todo cargado</button>
    <button class="btn" style="font-size:12px;padding:8px;border-color:var(--red-border);color:var(--red-text)" id="btn-none" onclick="marcarTodo(false)">✗ Desmarcar todo</button>
  </div>

  <div id="checklist-container"></div>

  <button class="btn" style="width:100%;font-size:12px;padding:7px;border-style:dashed">✏️ Editar evento / pack</button>
</div>

<script>
var DEPS=[{id:1,nombre:'Depósito Principal'},{id:2,nombre:'Garage Casa'}];
var CL=[
  {modelId:1,uid:'LA-001',modelo:'Line Array QSC K12.2',ico:'🔊',dep:1,carga:true, regreso:false},
  {modelId:1,uid:'LA-002',modelo:'Line Array QSC K12.2',ico:'🔊',dep:1,carga:true, regreso:false},
  {modelId:1,uid:'LA-003',modelo:'Line Array QSC K12.2',ico:'🔊',dep:1,carga:false,regreso:false},
  {modelId:1,uid:'LA-004',modelo:'Line Array QSC K12.2',ico:'🔊',dep:2,carga:true, regreso:false},
  {modelId:1,uid:'LA-005',modelo:'Line Array QSC K12.2',ico:'🔊',dep:2,carga:false,regreso:false},
  {modelId:1,uid:'LA-006',modelo:'Line Array QSC K12.2',ico:'🔊',dep:1,carga:false,regreso:false},
  {modelId:2,uid:'SUB-001',modelo:'Subwoofer KS212',ico:'🔉',dep:1,carga:true, regreso:false},
  {modelId:2,uid:'SUB-002',modelo:'Subwoofer KS212',ico:'🔉',dep:1,carga:false,regreso:false},
  {modelId:2,uid:'SUB-004',modelo:'Subwoofer KS212',ico:'🔉',dep:2,carga:false,regreso:false},
  {modelId:3,uid:'BEAM-001',modelo:'Beam Sharpy 200',ico:'💡',dep:1,carga:false,regreso:false},
  {modelId:3,uid:'BEAM-002',modelo:'Beam Sharpy 200',ico:'💡',dep:1,carga:false,regreso:false},
  {modelId:3,uid:'BEAM-003',modelo:'Beam Sharpy 200',ico:'💡',dep:1,carga:false,regreso:false},
  {modelId:3,uid:'BEAM-004',modelo:'Beam Sharpy 200',ico:'💡',dep:2,carga:false,regreso:false},
  {modelId:3,uid:'BEAM-005',modelo:'Beam Sharpy 200',ico:'💡',dep:2,carga:false,regreso:false},
  {modelId:3,uid:'BEAM-006',modelo:'Beam Sharpy 200',ico:'💡',dep:1,carga:false,regreso:false},
  {modelId:3,uid:'BEAM-007',modelo:'Beam Sharpy 200',ico:'💡',dep:1,carga:false,regreso:false},
  {modelId:3,uid:'BEAM-008',modelo:'Beam Sharpy 200',ico:'💡',dep:1,carga:false,regreso:false},
  {modelId:4,uid:'LED-001',modelo:'Módulos LED P4',ico:'📺',dep:1,carga:false,regreso:false},
  {modelId:4,uid:'LED-002',modelo:'Módulos LED P4',ico:'📺',dep:1,carga:false,regreso:false},
  {modelId:4,uid:'LED-003',modelo:'Módulos LED P4',ico:'📺',dep:1,carga:false,regreso:false},
  {modelId:4,uid:'LED-004',modelo:'Módulos LED P4',ico:'📺',dep:2,carga:false,regreso:false},
];

var currentTab='carga';
var TOTAL=CL.length;

function depN(id){return(DEPS.find(d=>d.id===id)||{nombre:'?'}).nombre}

function toggle(idx){
  if(currentTab==='carga') CL[idx].carga=!CL[idx].carga;
  else CL[idx].regreso=!CL[idx].regreso;
  render();
}

// Marcar/desmarcar TODO globalmente
function marcarTodo(val){
  CL.forEach(item=>{
    if(currentTab==='carga') item.carga=val;
    else item.regreso=val;
  });
  render();
}

// Marcar/desmarcar por modelo
function marcarGrupo(modelId, val){
  CL.filter(x=>x.modelId===modelId).forEach(item=>{
    if(currentTab==='carga') item.carga=val;
    else item.regreso=val;
  });
  render();
}

function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-carga').classList.toggle('on',tab==='carga');
  document.getElementById('tab-regreso').classList.toggle('on',tab==='regreso');
  document.getElementById('btn-all').textContent = tab==='carga' ? '✓ Todo cargado' : '✓ Todo regresó';
  document.getElementById('log-search').value='';
  render();
}

function hl(text,q){
  if(!q) return text;
  return text.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),s=>`<span class="hl">${s}</span>`);
}

function render(){
  var q=document.getElementById('log-search').value.toLowerCase().trim();
  var cargados=CL.filter(x=>x.carga).length;
  var regresados=CL.filter(x=>x.regreso).length;
  var tab=currentTab;
  var pct=tab==='carga'?Math.round(cargados/TOTAL*100):Math.round(regresados/TOTAL*100);

  // contadores globales
  document.getElementById('c-count').textContent=cargados;
  document.getElementById('r-count').textContent=regresados;
  document.getElementById('tab-c').textContent=cargados;
  document.getElementById('tab-r').textContent=regresados;
  document.getElementById('prog-bar').style.width=pct+'%';

  // steps
  var sc=document.getElementById('step-carga');
  var se=document.getElementById('step-evento');
  var sr=document.getElementById('step-regreso');
  var l1=document.getElementById('line-1');
  var l2=document.getElementById('line-2');
  sc.className='step-circle'+(cargados===TOTAL?' done':cargados>0?' active':'');
  se.className='step-circle'+(regresados===TOTAL?' done':cargados===TOTAL?' active':'');
  sr.className='step-circle'+(regresados===TOTAL?' done':'');
  l1.className='step-line'+(cargados===TOTAL?' done':'');
  l2.className='step-line'+(regresados===TOTAL?' done':'');

  // agrupar por modelo
  var grupos={};
  CL.forEach((item,idx)=>{
    if(!grupos[item.modelId]) grupos[item.modelId]={modelo:item.modelo,ico:item.ico,modelId:item.modelId,items:[]};
    grupos[item.modelId].items.push({...item,idx});
  });

  var html='';
  var totalResultados=0;

  Object.values(grupos).forEach(g=>{
    // filtrar por búsqueda
    var filtrados=g.items.filter(item=>{
      if(!q) return true;
      return item.uid.toLowerCase().includes(q)||
             item.modelo.toLowerCase().includes(q)||
             depN(item.dep).toLowerCase().includes(q);
    });
    if(!filtrados.length) return;
    totalResultados+=filtrados.length;

    // stats del grupo completo (no solo filtrados)
    var doneTodo=tab==='carga'?g.items.filter(x=>x.carga).length:g.items.filter(x=>x.regreso).length;
    var pctGrupo=Math.round(doneTodo/g.items.length*100);
    var todosOn=doneTodo===g.items.length;

    html+=`<div class="grupo-card">
      <div class="grupo-header">
        <div class="grupo-ico">${g.ico}</div>
        <div class="grupo-info">
          <div class="grupo-nombre">${q?hl(g.modelo,q):g.modelo}</div>
          <div class="grupo-sub">${doneTodo}/${g.items.length} ${tab==='carga'?'cargados':'regresaron'}</div>
          <div class="grupo-prog"><div class="grupo-prog-f" style="width:${pctGrupo}%"></div></div>
        </div>
        <div class="grupo-acciones">
          <button class="mini-btn all" onclick="marcarGrupo(${g.modelId},true)">✓ Todo</button>
          <button class="mini-btn none" onclick="marcarGrupo(${g.modelId},false)">✗</button>
        </div>
      </div>
      <div class="grupo-items">`;

    filtrados.forEach(item=>{
      var checked=tab==='carga'?item.carga:item.regreso;
      var dep=depN(item.dep);
      html+=`<div class="chk-unit" onclick="toggle(${item.idx})">
        <div class="chk-box${checked?' on':''}"></div>
        <div class="chk-uid">${q?hl(item.uid,q):item.uid}</div>
        <div class="chk-model">${g.modelo.split(' ').pop()}</div>
        <div class="chk-dep">📍 ${q?hl(dep,q):dep}</div>
      </div>`;
    });

    html+=`</div></div>`;
  });

  if(q&&totalResultados===0){
    html=`<div class="card"><div class="no-results">🔍 Sin resultados para "<strong>${q}</strong>"</div></div>`;
  }
  if(q&&totalResultados>0){
    html=`<div style="font-size:12px;color:var(--text2);margin-bottom:2px">${totalResultados} resultado${totalResultados!==1?'s':''} para "<strong>${q}</strong>"</div>`+html;
  }

  document.getElementById('checklist-container').innerHTML=html;
}

render();
</script>
